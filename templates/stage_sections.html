{#
  Shared stage picker + conditional extra fields.
  Available in all templates via the inject_event_specs context processor.
  Requires: event_specs, form, today, t
#}

<style>
  /* ── Stage picker ──────────────────────────────────────────────── */
  .stage-picker {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(128px, 1fr));
    gap: 0.45rem;
    margin-bottom: 1rem;
  }
  .stage-item { position: relative; }
  .stage-radio {
    position: absolute;
    opacity: 0;
    width: 0;
    height: 0;
    pointer-events: none;
  }
  .stage-lbl {
    display: flex;
    align-items: center;
    gap: 0.4rem;
    padding: 0.5rem 0.75rem;
    border: 1px solid #d0d5dd;
    border-radius: 7px;
    background: #fff;
    color: #4a5568;
    font-size: 0.82rem;
    cursor: pointer;
    transition: border-color 0.13s, background 0.13s, color 0.13s;
    user-select: none;
    white-space: nowrap;
    overflow: hidden;
  }
  .stage-lbl i { opacity: 0.6; flex-shrink: 0; }
  .stage-lbl:hover { background: #f5f8fa; border-color: #aab4c0; }
  .stage-radio:checked + .stage-lbl {
    background: #eef5f1;
    border-color: #4a8a68;
    color: #2a5c48;
    font-weight: 600;
  }
  .stage-radio:checked + .stage-lbl i { opacity: 1; }

  /* ── Extra fields ──────────────────────────────────────────────── */
  .stage-extra {
    background: #f8fafc;
    border: 1px solid #e4e8ed;
    border-radius: 7px;
    padding: 1rem;
    margin-top: 0.25rem;
  }
  #shared-event-date { margin-bottom: 0.75rem; }
  #shared-event-date .form-label,
  .stage-extra .form-label {
    font-size: 0.82rem;
    font-weight: 600;
    color: #3d4d5c;
    margin-bottom: 0.3rem;
  }
  .stage-extra .form-text { font-size: 0.76rem; color: #a0aec0; margin-top: 0.2rem; }
</style>

<div class="stage-picker">
  {% for s in event_specs %}
  <div class="stage-item">
    <input type="radio" class="stage-radio"
           name="status" id="btn-{{ s.code }}" value="{{ s.code }}"
           {% if form.status == s.code %}checked{% endif %}>
    <label class="stage-lbl" for="btn-{{ s.code }}">
      <i class="fas {{ s.icon }}"></i>
      {{ t[s.label] if s.label in t else s.label }}
    </label>
  </div>
  {% endfor %}
</div>

<!-- Shared: event date (always visible) -->
<div id="shared-event-date">
  <label class="form-label">{{ t['Event date'] }}</label>
  <input type="date" class="form-control" name="event_date"
         value="{{ form.event_date or today }}">
</div>

<!-- Sow: germination range -->
<div id="extra-sow" class="stage-extra"
     {% if form.status != 'sow' %}style="display:none"{% endif %}>
  <div class="row g-3">
    <div class="col-sm-6">
      <label class="form-label">{{ t['Est. sprout time (min)'] }}</label>
      <div class="input-group">
        <input type="number" class="form-control"
               name="event_range_min" value="{{ form.event_range_min }}">
        <select class="form-select" name="event_range_min_u">
          {% for unit in ['days','weeks','months'] %}
            <option value="{{ unit }}"
              {% if form.event_range_min_u == unit %}selected{% endif %}>
              {{ t[unit] }}
            </option>
          {% endfor %}
        </select>
      </div>
    </div>
    <div class="col-sm-6">
      <label class="form-label">{{ t['Est. sprout time (max)'] }}</label>
      <div class="input-group">
        <input type="number" class="form-control"
               name="event_range_max" value="{{ form.event_range_max }}">
        <select class="form-select" name="event_range_max_u">
          {% for unit in ['days','weeks','months'] %}
            <option value="{{ unit }}"
              {% if form.event_range_max_u == unit %}selected{% endif %}>
              {{ t[unit] }}
            </option>
          {% endfor %}
        </select>
      </div>
    </div>
  </div>
</div>

<!-- Soak / Strat: duration -->
<div id="extra-duration" class="stage-extra"
     {% if form.status not in ['soak','strat'] %}style="display:none"{% endif %}>
  <div class="row g-3">
    <div class="col-sm-6">
      <label class="form-label">{{ t['Duration'] }}</label>
      <div class="input-group">
        <input type="number" class="form-control"
               name="event_dur_val" value="{{ form.event_dur_val }}">
        <select class="form-select" name="event_dur_unit">
          {% for unit in ['hours','days','weeks','months'] %}
            <option value="{{ unit }}"
              {% if form.event_dur_unit == unit %}selected{% endif %}>
              {{ t[unit] }}
            </option>
          {% endfor %}
        </select>
      </div>
    </div>
  </div>
</div>

<!-- Measure: size -->
<div id="extra-measure" class="stage-extra"
     {% if form.status != 'measure' %}style="display:none"{% endif %}>
  <div class="row g-3">
    <div class="col-sm-6">
      <label class="form-label">{{ t['Size'] }}</label>
      <div class="input-group">
        <input type="number" class="form-control"
               name="event_size_val" value="{{ form.event_size_val }}">
        <select class="form-select" name="event_size_unit">
          {% for unit in ['mm','cm','m'] %}
            <option value="{{ unit }}"
              {% if form.event_size_unit == unit %}selected{% endif %}>
              {{ unit }}
            </option>
          {% endfor %}
        </select>
      </div>
    </div>
  </div>
</div>

<!-- Flower / Fruit: optional end date -->
<div id="extra-flower-fruit" class="stage-extra"
     {% if form.status not in ['flower','fruit'] %}style="display:none"{% endif %}>
  <div class="row g-3">
    <div class="col-sm-6">
      <label class="form-label">
        {{ t['End date'] }}
        <span style="font-weight:400; color:#a0aec0; font-size:0.78rem">
          ({{ t['optional'] }})
        </span>
      </label>
      <input type="date" class="form-control"
             name="event_ended_on" value="{{ form.event_ended_on }}">
      <div class="form-text">{{ t['optional_end_date_hint'] }}</div>
    </div>
  </div>
</div>

<!-- Custom event: label + note -->
<div id="extra-custom-action" class="stage-extra"
     {% if form.status != 'custom' %}style="display:none"{% endif %}>
  <div class="mb-3">
    <label class="form-label">{{ t['Event title'] }}</label>
    <input type="text" class="form-control"
           name="event_custom_label" value="{{ form.event_custom_label }}">
  </div>
  <div>
    <label class="form-label">{{ t['Note content'] }}</label>
    <textarea class="form-control" name="event_custom_note"
              rows="3">{{ form.event_custom_note }}</textarea>
  </div>
</div>

<script>
  (function () {
    var extraMap = {
      'sow':    'extra-sow',
      'soak':   'extra-duration',
      'strat':  'extra-duration',
      'measure':'extra-measure',
      'flower': 'extra-flower-fruit',
      'fruit':  'extra-flower-fruit',
      'custom': 'extra-custom-action',
    };

    function applyExtras(val) {
      document.querySelectorAll('.stage-extra').forEach(function(el) {
        el.style.display = 'none';
      });
      var target = extraMap[val];
      if (target) {
        var el = document.getElementById(target);
        if (el) el.style.display = '';
      }
    }

    document.querySelectorAll('input[name="status"]').forEach(function(r) {
      r.addEventListener('change', function() { applyExtras(r.value); });
    });

    var checked = document.querySelector('input[name="status"]:checked');
    if (checked) applyExtras(checked.value);
  })();
</script>
